<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTX Live — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #12151f;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(62,207,239,0.05) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
  }
  .card {
    background: #1e2535;
    border-radius: 24px;
    padding: 48px 36px;
    max-width: 420px;
    width: 100%;
    border: 1px solid rgba(62,207,239,0.15);
    position: relative; z-index: 1;
    text-align: center;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .logo em { font-style: normal; color: #3ecfef; }
  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-bottom: 36px;
  }
  h2 {
    font-size: 22px; font-weight: 700;
    margin-bottom: 8px;
  }
  .sub {
    font-size: 14px; color: rgba(255,255,255,0.45);
    margin-bottom: 28px; line-height: 1.6;
  }
  input[type="email"] {
    width: 100%;
    padding: 15px 18px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="email"]:focus { border-color: #3ecfef; }
  input[type="email"]::placeholder { color: rgba(255,255,255,0.25); }
  .login-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #3ecfef, #5b8df5);
    color: #fff; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(62,207,239,0.3);
    margin-bottom: 20px;
  }
  .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(62,207,239,0.45); }
  .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .msg {
    font-size: 14px; padding: 14px; border-radius: 8px;
    margin-bottom: 16px; display: none;
  }
  .msg.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #4ade80; }
  .msg.error { background: rgba(255,100,100,0.1); border: 1px solid rgba(255,100,100,0.3); color: #ff8080; }

  .divider {
    height: 1px; background: rgba(255,255,255,0.07);
    margin: 20px 0;
  }
  .signup-link {
    font-size: 13px; color: rgba(255,255,255,0.35);
  }
  .signup-link a { color: #3ecfef; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">DTX<em> Live</em></div>
  <div class="tagline">Member Login</div>

  <h2>Welcome Back</h2>
  <p class="sub">Enter your email and we'll send you a magic link to access your account — no password needed.</p>

  <div class="msg" id="msg"></div>

  <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email">
  <button class="login-btn" id="loginBtn" onclick="sendLink()">Send My Access Link</button>

  <div class="divider"></div>
  <div class="signup-link">Don't have an account? <a href="index.html">View Plans →</a></div>
</div>

<script>
async function sendLink() {
  const email = document.getElementById('emailInput').value.trim();
  const btn = document.getElementById('loginBtn');
  const msg = document.getElementById('msg');

  if (!email) {
    showMsg('Please enter your email address.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const res = await fetch('https://inspired-by-god-site-production.up.railway.app/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (res.ok) {
      showMsg('✓ Magic link sent! Check your email inbox.', 'success');
      btn.textContent = 'Link Sent!';
    } else {
      showMsg(data.error || 'No active subscription found for this email.', 'error');
      btn.disabled = false;
      btn.textContent = 'Send My Access Link';
    }
  } catch (err) {
    showMsg('Something went wrong. Please try again.', 'error');
    btn.disabled = false;
    btn.textContent = 'Send My Access Link';
  }
}

function showMsg(text, type) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = `msg ${type}`;
  msg.style.display = 'block';
}

// Allow Enter key
document.getElementById('emailInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') sendLink();
});
</script>
</body>
</html>
